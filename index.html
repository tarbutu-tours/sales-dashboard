<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד מכירות – קרוזים מהיר</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0B1F3A;color:#F0F4F8;direction:rtl;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#1DB8A0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
select,button,input{font-family:inherit}
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px}
.filter-bar{display:flex;gap:15px;margin-bottom:20px;background:#1A3257;padding:12px;border-radius:8px;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group label{font-size:12px;color:#7A9BBF}
.filter-group input, .filter-group select{padding:6px 10px;background:#0B1F3A;border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:4px}
.agent-table{width:100%;border-collapse:collapse;margin-top:10px}
.agent-table th, .agent-table td{padding:10px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.07)}
.agent-table th{color:#7A9BBF;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// קישור ה-CSV המהיר מהגוגל שיטס שלך
const GOOGLE_SHEET_CSV_URL = "https://google.com";

const COLORS   = ["#1DB8A0","#1A9AE0","#F0B429","#E84855","#7B68EE","#F06292"];
const T = { navy:"#0B1F3A", navyMid:"#132847", navyCard:"#1A3257", teal:"#1DB8A0", gold:"#F0B429", red:"#E84855", muted:"#7A9BBF", border:"rgba(255,255,255,0.07)" };
const card = { background:T.navyCard, border:"1px solid "+T.border, borderRadius:12, padding:"14px 16px" };
const ct = { fontSize:11, color:T.muted, fontWeight:600, marginBottom:10, textTransform:"uppercase", letterSpacing:".05em" };

const ILS_TO_USD = 3.7;
const fmt = v => {
  if(!v||isNaN(v)) return "$0";
  v = Number(v) / ILS_TO_USD;
  if(v>=1000000) return "$"+(v/1000000).toFixed(1)+"M";
  if(v>=1000) return "$"+Math.round(v/1000)+"K";
  return "$"+Math.round(v).toLocaleString("en-US");
};

const mmss = s => Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
const ACTIVE_AGENTS = ["avi","rahelz","rahel"];
const isActive = name => ACTIVE_AGENTS.some(n=>(name||"").toLowerCase().includes(n));

// פונקציית פיענוח CSV כללית
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, "");
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  return lines.map(line => {
    const out = []; let cur = ""; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === "," && !inQ) { out.push(cur); cur = ""; continue; }
      cur += c;
    }
    out.push(cur);
    return out;
  });
}

function Kpi({label, value, color}) {
  return <div style={{...card,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,right:0,width:3,height:"100%",background:color||T.teal}}/>
    <div style={{fontSize:11,color:T.muted,marginBottom:5}}>{label}</div>
    <div style={{fontSize:26,fontWeight:700,lineHeight:1}}>{value}</div>
  </div>;
}

function Dashboard() {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  
  // נתוני הגלם שישלפו מהשיט
  const [deals, setDeals] = useState([]);
  const [calls, setCalls] = useState([]);
  const [users, setUsers] = useState({});
  const [stages, setStages] = useState({});
  
  // פילטר תאריכים - ברירת מחדל מושתלת ל"היום" בפורמט YYYY-MM-DD
  const [selectedDate, setSelectedDate] = useState(() => {
    return new Date().toLocaleDateString('en-CA'); 
  });

  useEffect(() => {
    async function loadData() {
      try {
        setLoading(true);
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if(!response.ok) throw new Error("נכשל בהבאת נתונים מהשיט");
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        
        const fetchedDeals = [];
        const fetchedCalls = [];
        const fetchedUsers = {};
        const fetchedStages = {};

        // עיבוד השורות מהשיט וחלוקה לקטגוריות לפי העמודה הראשונה
        rows.forEach(row => {
          const type = row[0];
          if (type === "DEAL") {
            fetchedDeals.push({
              id: row[1], title: row[2], value: parseFloat(row[3])||0, currency: row[4],
              status: row[5], stage_id: row[6], user_id: row[7], add_time: row[8], update_time: row[9]
            });
          } else if (type === "CALL") {
            fetchedCalls.push({
              id: row[1], direction: row[2], duration: parseInt(row[3])||0,
              user_id: row[4], user_name: row[5], created_at: row[6] // תאריך השיחה
            });
          } else if (type === "USER") {
            fetchedUsers[row[1]] = row[2];
          } else if (type === "STAGE") {
            fetchedStages[row[1]] = row[2];
          }
        });

        setDeals(fetchedDeals);
        setCalls(fetchedCalls);
        setUsers(fetchedUsers);
        setStages(fetchedStages);
        setLoading(false);
      } catch (err) {
        setError(err.message);
        setLoading(false);
      }
    }
    loadData();
  }, []);

  // סינון נתונים לפי התאריך שנבחר (ברירת מחדל: היום)
  const filteredData = useMemo(() => {
    if (!selectedDate) return { deals, calls };
    
    const filteredDeals = deals.filter(d => (d.add_time || "").startsWith(selectedDate));
    const filteredCalls = calls.filter(c => {
      if (!c.created_at) return false;
      // התאמת פורמט תאריך מאירקול (למשל ISO או תאריך רגיל) לתאריך הנבחר
      return c.created_at.startsWith(selectedDate);
    });

    return { deals: filteredDeals, calls: filteredCalls };
  }, [selectedDate, deals, calls]);

  // חישוב ביצועי נציגים עבור התאריך המסונן
  const agentStats = useMemo(() => {
    const stats = {};
    ACTIVE_AGENTS.forEach(a => stats[a] = { calls: 0, duration: 0, dealsWon: 0, volume: 0 });

    filteredData.calls.forEach(c => {
      const name = (c.user_name || "").toLowerCase();
      const matched = ACTIVE_AGENTS.find(a => name.includes(a));
      if (matched) {
        stats[matched].calls += 1;
        stats[matched].duration += c.duration;
      }
    });

    filteredData.deals.forEach(d => {
      const uName = (users[d.user_id] || "").toLowerCase();
      const matched = ACTIVE_AGENTS.find(a => uName.includes(a));
      if (matched && d.status === "won") {
        stats[matched].dealsWon += 1;
        stats[matched].volume += d.value;
      }
    });

    return stats;
  }, [filteredData, users]);

  if (loading) return <div style={{padding:40,textAlign:"center"}}><div className="spinner"></div>טוען נתונים מהגוגל שיטס ב-2 שניות...</div>;
  if (error) return <div style={{padding:40,color:T.red}}>שגיאה: {error}</div>;

  const totalCalls = filteredData.calls.length;
  const totalDuration = filteredData.calls.reduce((acc, c) => acc + c.duration, 0);
  const totalDealsWon = filteredData.deals.filter(d => d.status === "won").length;
  const totalVolume = filteredData.deals.filter(d => d.status === "won").reduce((acc, d) => acc + d.value, 0);

  return (
    <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>
      <h2 style={{marginBottom:20,color:T.teal}}>דשבורד מבוסס Google Sheets – טעינה מהירה 🚀</h2>
      
      {/* סרגל סינון התאריכים */}
      <div className="filter-bar">
        <div className="filter-group">
          <label>בחר תאריך לצפייה:</label>
          <input 
            type="date" 
            value={selectedDate} 
            onChange={(e) => setSelectedDate(e.target.value)} 
          />
        </div>
        <div style={{fontSize:12,color:T.muted,marginRight:"auto"}}>
          * מציג כעת נתונים עבור יום: <strong style={{color:'#fff'}}>{selectedDate}</strong> (ברירת מחדל: היום)
        </div>
      </div>

      {/* קוביות KPI מהירות */}
      <div className="dashboard-grid">
        <Kpi label="סך הכל שיחות (אירקול)" value={totalCalls.toLocaleString()} color={T.teal} />
        <Kpi label="זמן שיחות כולל" value={mmss(totalDuration)} color={T.gold} />
        <Kpi label="עסקאות שנערכו/נסגרו היום" value={totalDealsWon} color="#1A9AE0" />
        <Kpi label="סך מכירות (ILS)" value={"₪" + totalVolume.toLocaleString()} color={T.red} />
      </div>

      {/* טבלת נציגים ואירקול */}
      <div style={card}>
        <div style={ct}>ביצועי נציגים לתאריך הנבחר</div>
        <table className="agent-table">
          <thead>
            <tr>
              <th>שם נציג</th>
              <th>מספר שיחות</th>
              <th>זמן דיבור כולל</th>
              <th>עסקאות שנסגרו</th>
              <th>נפח מכירות</th>
            </tr>
          </thead>
          <tbody>
            {Object.entries(agentStats).map(([agent, data]) => (
              <tr key={agent}>
                <td style={{fontWeight:600,color:T.teal}}>{agent.toUpperCase()}</td>
                <td>{data.calls}</td>
                <td>{mmss(data.duration)}</td>
                <td>{data.dealsWon}</td>
                <td>{"₪" + data.volume.toLocaleString()}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const root = destructured => ReactDOM.createRoot(document.getElementById("root"));
root().render(<Dashboard />);
</script>
</body>
</html>
