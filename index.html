const AC_ID    = "c7974dd8b8bb959624fe606ef9ee4559";

const COLORS = ["#1DB8A0","#1A9AE0","#F0B429","#E84855","#7B68EE","#F06292"];
const T = {

const fmt=v=>{if(!v||isNaN(v))return"₪0";v=Number(v);if(v>=1000000)return"₪"+(v/1000000).toFixed(1)+"M";if(v>=1000)return"₪"+Math.round(v/1000)+"K";return"₪"+Math.round(v).toLocaleString("he-IL")};
const ago=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0]};

// ── פונקציות API עם מספר proxies כגיבוי ──────────────────────────────────
// ← כתובת ה-Worker שלך מ-Cloudflare (תעדכן אחרי ההגדרה)
const WORKER_URL = "https://floral-bonus-cfa3.yanivd.workers.dev";

async function fetchWithProxy(url, opts={}) {
  const proxyUrl = WORKER_URL + "?url=" + encodeURIComponent(url);
  const r = await fetch(proxyUrl, {...opts, signal: AbortSignal.timeout(15000)});
  if (!r.ok) throw new Error("Worker error: " + r.status);
  return r;
}

async function pdGet(ep, start=0, acc=[]) {
  const url = `https://api.pipedrive.com/v1${ep}${ep.includes("?")?"&":"?"}api_token=${PD_TOKEN}&limit=50&start=${start}`;
  const r = await fetchWithProxy(url);
  const j = await r.json();
  if (!j.success) throw new Error(j.error || "PD error");
  const data = [...acc, ...(j.data || [])];
  // המשך אם יש עוד נתונים (pagination)
  if (j.additional_data?.pagination?.more_items_in_collection && data.length < 500) {
    return pdGet(ep, j.additional_data.pagination.next_start, data);
  }
  return data;
}

async function acGet(ep) {
  const url = `https://api.aircall.io/v1${ep}`;
  const r = await fetchWithProxy(url, {
    headers: {
      "Authorization": "Basic " + btoa(AC_ID + ":" + AC_SEC),
      "Accept": "application/json"
    }
  });
  return r.json();
}

  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {arr.map(([n,c],i)=><div key={n} style={{display:"flex",alignItems:"center",gap:7}}>
      <div style={{fontSize:11,color:T.muted,width:78,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div>
      <div style={{flex:1,height:20,background:"rgba(255,255,255,.05)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${Math.round(c/max*100)}%`,height:"100%",background:COLORS[i%6],

}

function ProductsTab({products,codeMap}) {
  const [search,setSearch]=useState("");
  const roomColors={"פנימי":"#1A9AE0","חלון":"#1DB8A0","מרפסת":"#F0B429","דק עליון":"#7B68EE","דק אמצעי":"#F06292"};
  const getRoomColor=rt=>{for(const [k,v] of Object.entries(roomColors)) if(rt&&rt.includes(k)) return v;return "#888"};
  const parsed=products.map(p=>{
    const parts=(p.name||"").split("-");
    const code=parts[0]||"",tripNum=parts[1]||"",roomType=parts.slice(2).join("-")||"";
    return {...p,code,tripNum,roomType,tripName:codeMap[code]||""};
  });
  const filtered=parsed.filter(p=>{
    const q=search.toLowerCase();
    return !q||p.name.toLowerCase().includes(q)||p.tripName.toLowerCase().includes(q)||p.roomType.toLowerCase().includes(q);
  });
  const totalFree=parsed.reduce((s,p)=>s+(Number(p.quantity_available)||0),0);
  const totalUsed=parsed.reduce((s,p)=>s+(Number(p.quantity_used)||0),0);
  const trips=[...new Set(parsed.map(p=>p.tripNum))].length;
  return <div className="fade">
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
      <Kpi label="🛳️ מוצרים" value={parsed.length} delta="חדרים במלאי"/>
      <Kpi label="🗺️ טיולים" value={trips} delta="יעדים שונים"/>
      <Kpi label="✅ פנויים" value={totalFree} color={T.teal} dc={T.teal}/>
      <Kpi label="🔒 תפוסים" value={totalUsed} color={T.gold} dc={T.gold}/>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)}
      placeholder="🔍 חפש קוד, שם טיול, סוג חדר..."
      style={{background:T.navyCard,border:"1px solid "+T.border,color:"#F0F4F8",
        fontSize:12,padding:"8px 12px",borderRadius:8,width:"100%",marginBottom:10,direction:"rtl"}}/>
    <div style={{fontSize:11,color:T.muted,marginBottom:8}}>{filtered.length} מוצרים</div>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr>{["שם מוצר","קוד","סוג חדר","פנויים","תפוסים","סה״כ"].map(h=>
          <th key={h} style={{color:T.muted,fontWeight:500,textAlign:"right",padding:"6px 8px",
            borderBottom:"1px solid "+T.border,fontSize:10,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
        )}</tr></thead>
        <tbody>{filtered.map(p=>{
          const free=Number(p.quantity_available)||0,used=Number(p.quantity_used)||0,total=Number(p.quantity)||free+used;
          const col=getRoomColor(p.roomType);
          return <tr key={p.id} style={{borderBottom:"1px solid "+T.border}}>
            <td style={{padding:"8px",fontWeight:500}}>{p.name||"–"}</td>
            <td style={{padding:"8px"}}>
              <div style={{fontSize:12,fontWeight:600,color:T.teal}}>{p.code}</div>
              {p.tripName&&<div style={{fontSize:10,color:T.muted,marginTop:1}}>{p.tripName}</div>}
            </td>
            <td style={{padding:"8px"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:col+"22",color:col,fontWeight:600}}>{p.roomType||"–"}</span></td>
            <td style={{padding:"8px"}}><span style={{fontSize:13,fontWeight:700,color:free>0?T.teal:T.red}}>{free}</span></td>
            <td style={{padding:"8px",color:T.muted}}>{used}</td>
            <td style={{padding:"8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:6,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden",minWidth:40}}>
                  <div style={{width:total>0?`${Math.min(100,Math.round(used/total*100))}%`:"0%",height:6,
                    background:total>0&&used/total>0.8?T.red:T.teal,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,color:T.muted,minWidth:20}}>{total}</span>
              </div>
            </td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("main");
  const [days,setDays]=useState(30);
  const [loading,setLoading]=useState(true);
  const [ts,setTs]=useState(null);
  const [d,setD]=useState(null);
  const [errs,setErrs]=useState([]);
  const [codeMap,setCodeMap]=useState({});
  const [loadStatus,setLoadStatus]=useState("מתחבר...");

  useEffect(()=>{
    try{const s=localStorage.getItem("cruise_codes");if(s){const arr=JSON.parse(s);const m={};arr.forEach(c=>{m[c.code]=c.name});setCodeMap(m);}}catch(e){}
  },[]);

  const load=useCallback(async()=>{
    setLoading(true);setErrs([]);setLoadStatus("שולף עסקאות...");
    const today=new Date().toISOString().split("T")[0];
    const fromDate=days===0?today:days===1?ago(1):ago(days);
    const toDate=days===1?ago(1):today;
    const rangeLabel=days===0?"היום":days===1?"אתמול":days+" ימים";
    const sinceTs=Math.floor(new Date(fromDate).getTime()/1000);
    const e=[];

    const [deals,persons,acts,users,stages,products,callsRaw]=await Promise.all([
      pdGet("/deals?status=all").catch(ex=>{e.push("Pipedrive עסקאות: "+ex.message);return[]}),
      (setLoadStatus("שולף לידים..."),pdGet("/persons").catch(()=>[])),
      pdGet("/activities?done=0").catch(()=>[]),
      pdGet("/users").catch(()=>[]),
      pdGet("/stages").catch(()=>[]),
      (setLoadStatus("שולף מלאי..."),pdGet("/products").catch(()=>[])),
      (setLoadStatus("שולף שיחות..."),acGet("/calls?order=DESC&per_page=50&from="+sinceTs).catch(ex=>{e.push("Aircall: "+ex.message);return null}))
    ]);

    const open=deals.filter(x=>x.status==="open");
    const won=deals.filter(x=>x.status==="won");
    const newP=persons.filter(p=>p.add_time&&p.add_time.substring(0,10)>=fromDate&&p.add_time.substring(0,10)<=toDate);
    const recW=won.filter(x=>x.won_time&&x.won_time.substring(0,10)>=fromDate&&x.won_time.substring(0,10)<=toDate);
    const pVal=open.reduce((s,x)=>s+(Number(x.value)||0),0);
    const sm={};stages.forEach(s=>sm[s.id]=s.name);
    const um={};users.forEach(u=>um[u.id]=u.name);

    let calls=[];
    const acOK=callsRaw!==null;
    if(acOK){if(Array.isArray(callsRaw))calls=callsRaw;else if(callsRaw.calls)calls=callsRaw.calls;else if(callsRaw.data)calls=callsRaw.data;}
    const ib=calls.filter(c=>c.direction==="inbound");
    const ob=calls.filter(c=>c.direction==="outbound");
    const ms=calls.filter(c=>c.missed===true||c.status==="missed"||(c.direction==="inbound"&&c.answered===false)||(c.direction==="inbound"&&!c.duration));
    const ans=calls.filter(c=>c.answered===true||(c.duration>0&&c.status!=="missed"));
    const dur=ans.length?Math.round(ans.reduce((s,c)=>s+(c.duration||0),0)/ans.length):0;
    const rate=calls.length?Math.round((calls.length-ms.length)/calls.length*100):0;

    setD({open,won,newP,recW,pVal,sm,um,acts,calls,acOK,ib,ob,ms,dur,rate,products});
    setErrs(e);setTs(new Date().toLocaleTimeString("he-IL"));
    setLoading(false);setLoadStatus("מחובר");
  },[days]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{const id=setInterval(load,5*60*1000);return()=>clearInterval(id);},[load]);

  const tabs=[{id:"main",label:"📊 סקירה"},{id:"leads",label:"🔥 לידים"},{id:"inventory",label:"🛳️ מלאי"},{id:"ads",label:"📢 פרסום"}];

  return <div style={{background:T.navy,minHeight:"100vh",direction:"rtl"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"10px 18px",borderBottom:"1px solid "+T.border,background:T.navyMid,
      position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:17,fontWeight:700,color:T.teal}}>⚓ דשבורד מכירות</span>
        <span style={{fontSize:12,color:T.muted}}>קרוזים מאורגנים</span>
        <span style={{width:7,height:7,borderRadius:"50%",background:loading?T.gold:T.teal,display:"inline-block"}}/>
        <span style={{fontSize:11,color:T.muted}}>{loading?loadStatus:ts?"מחובר · "+ts:""}</span>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <select value={days} onChange={e=>setDays(Number(e.target.value))}
          style={{background:T.navyCard,border:"1px solid "+T.border,color:"#F0F4F8",fontSize:12,padding:"5px 10px",borderRadius:6,cursor:"pointer"}}>
          <option value={0}>היום</option><option value={1}>אתמול</option><option value={7}>7 ימים</option><option value={30}>30 ימים</option><option value={90}>רבעון</option>
        </select>
        <button onClick={load} disabled={loading}
          style={{background:"transparent",border:"1px solid "+T.border,color:T.muted,fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>
          {loading?"...":"↻ רענן"}
        </button>
        <a href="codes.html" style={{background:"rgba(29,184,160,.1)",border:"1px solid rgba(29,184,160,.2)",
          color:T.teal,fontSize:12,padding:"5px 12px",borderRadius:6,textDecoration:"none"}}>
          ⚙️ קודי טיולים
        </a>
      </div>
    </div>

    <div style={{display:"flex",gap:2,padding:"8px 18px 0",borderBottom:"1px solid "+T.border,background:T.navyMid}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
        style={{background:tab===t.id?T.navyCard:"transparent",
          border:tab===t.id?"1px solid "+T.border:"1px solid transparent",
          borderBottom:tab===t.id?"1px solid "+T.navyCard:"none",
          color:tab===t.id?"#F0F4F8":T.muted,fontSize:12,padding:"7px 14px",
          borderRadius:"8px 8px 0 0",cursor:"pointer",fontWeight:tab===t.id?500:400,
          marginBottom:tab===t.id?"-1px":0}}>
        {t.label}
      </button>)}
    </div>

    <div style={{padding:"12px 18px"}}>
      {loading&&!d&&<div style={{textAlign:"center",padding:"3rem",color:T.muted}}>
        <div className="spinner"/>
        <div style={{marginBottom:8}}>{loadStatus}</div>
        <div style={{fontSize:11,color:T.muted}}>מתחבר ל-Pipedrive ו-Aircall...</div>
      </div>}

      {errs.map((e,i)=><Alert key={i} type="gold">⚠️ {e}</Alert>)}

      {d&&(()=>{
        const {open,won,newP,recW,pVal,sm,um,acts,calls,acOK,ib,ob,ms,dur,rate,products}=d;
        const stuck=open.filter(x=>dIn(x)>14).length;
        if(tab==="inventory") return <ProductsTab products={products} codeMap={codeMap}/>;
        if(tab==="ads") return <AdsTab/>;
        return <>
          {stuck>0&&<Alert type="red">⚠️ {stuck} עסקאות תקועות מעל 14 ימים</Alert>}
          {ms.length>8&&<Alert type="gold">📵 {ms.length} שיחות לא נענו ב-{days} ימים</Alert>}
          {tab==="main"&&<div className="fade">
            <SecDiv>Pipedrive</SecDiv>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
              <Kpi label="👥 לידים חדשים" value={newP.length} delta={rangeLabel}/>
              <Kpi label="📋 עסקאות פתוחות" value={open.length} delta="ב-pipeline"/>
              <Kpi label="✅ נסגרו" value={recW.length} delta={rangeLabel} dc={T.teal}/>
              <Kpi label="💰 ערך pipeline" value={fmt(pVal)} color={T.gold} dc={T.gold}/>
            </div>
            <SecDiv color={T.gold}>Aircall – שיחות</SecDiv>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
              <Kpi label="📞 סה״כ שיחות" value={acOK?calls.length:"–"} delta={rangeLabel}/>
              <Kpi label="📲 נכנסות" value={acOK?ib.length:"–"} dc={T.teal}/>
              <Kpi label="📤 יוצאות" value={acOK?ob.length:"–"} color={T.gold}/>
              <Kpi label="🔕 לא נענו" value={acOK?ms.length:"–"} delta={"מענה "+rate+"%"} color={T.red} dc={T.red}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div style={card}><div style={ct}>משפך מכירות</div><Funnel open={open} sm={sm}/></div>
              <div style={card}><div style={ct}>שיחות Aircall</div><Donut calls={calls} ib={ib} ob={ob} ms={ms} dur={dur} rate={rate} ok={acOK}/></div>
              <div style={card}>
                <div style={ct}>ערך לפי שלב</div>
                {(()=>{const sv={};open.forEach(x=>{const n=sm[x.stage_id]||"אחר";sv[n]=(sv[n]||0)+(Number(x.value)||0)});
                return Object.entries(sv).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,v])=>
                  <div key={n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                    <span style={{fontSize:11,color:T.muted}}>{n.substring(0,18)}</span>
                    <span style={{fontSize:12,fontWeight:600,color:T.teal}}>{fmt(v)}</span>
                  </div>)})()}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div style={card}><div style={ct}>נציגים</div><TeamBars open={open} um={um}/></div>
              <div style={card}>
                <div style={ct}>פעילויות קרובות</div>
                {(acts||[]).slice(0,6).map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                  <div><div style={{fontSize:12}}>{(a.subject||"").substring(0,24)}</div>
                  <div style={{fontSize:10,color:T.muted}}>{a.type} · {a.due_date}</div></div>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,
                    background:"rgba(240,180,41,.15)",color:T.gold}}>{a.due_date||"–"}</span>
                </div>)}
                {!acts?.length&&<div style={{color:T.muted,fontSize:12}}>אין פעילויות</div>}
              </div>
              <div style={card}>
                <div style={ct}>נסגרו לאחרונה</div>
                {won.sort((a,b)=>new Date(b.won_time||0)-new Date(a.won_time||0)).slice(0,5).map(x=>
                  <div key={x.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                    <span style={{fontSize:11,color:T.muted}}>{(x.title||"").substring(0,20)}</span>
                    <span style={{fontSize:12,fontWeight:600,color:T.teal}}>{fmt(x.value)}</span>
                  </div>
                )}
                {!won.length&&<div style={{color:T.muted,fontSize:12}}>אין עסקאות</div>}
              </div>
            </div>
          </div>}
          {tab==="leads"&&<div className="fade">
            <SecDiv color={T.gold}>כל העסקאות הפתוחות</SecDiv>
            <div style={card}><LeadsTable open={open} sm={sm} um={um}/></div>
          </div>}
        </>;
      })()}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
