<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד מכירות – קרוזים</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0B1F3A;color:#F0F4F8;direction:rtl;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#1DB8A0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
.fade{animation:fadeIn .3s ease}
select,button,input{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONFIG ──────────────────────────────────────────────────────────────────
const PD_TOKEN = "e30e3a85a358ecf8918b588d8af2fc31de1672dd";
const AC_ID    = "c7974dd8b8bb959624fe606ef9ee4559";
const AC_SEC   = "563ab5bc0049de0bdd0159193fc5e0c7";
const PROXY    = "https://corsproxy.io/?url=";

// ── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = v => {
  if(!v||isNaN(v)) return "₪0";
  v = Number(v);
  if(v>=1000000) return "₪"+(v/1000000).toFixed(1)+"M";
  if(v>=1000) return "₪"+Math.round(v/1000)+"K";
  return "₪"+Math.round(v).toLocaleString("he-IL");
};
const ago = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split("T")[0]; };
const daysIn = d => { if(!d.stage_change_time) return 0; return Math.floor((Date.now()-new Date(d.stage_change_time))/86400000); };
const mmss = s => Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
const COLORS = ["#1DB8A0","#1A9AE0","#F0B429","#E84855","#7B68EE","#F06292","#26C9A0","#FF8C42"];

// ── API ──────────────────────────────────────────────────────────────────────
async function pdGet(ep) {
  const url = "https://api.pipedrive.com/v1"+ep+(ep.includes("?")?"&":"?")+"api_token="+PD_TOKEN+"&limit=500";
  const r = await fetch(PROXY+encodeURIComponent(url));
  if(!r.ok) throw new Error("PD "+r.status);
  const j = await r.json();
  if(j.success===false) throw new Error(j.error||"Pipedrive error");
  // handle pagination
  const data = j.data||[];
  if(j.additional_data?.pagination?.more_items_in_collection) {
    const next = await pdGet(ep+(ep.includes("?")?"&":"?")+"start="+(j.additional_data.pagination.next_start));
    return [...data, ...next];
  }
  return data;
}
async function acGet(ep) {
  const url = "https://api.aircall.io/v1"+ep;
  const r = await fetch(PROXY+encodeURIComponent(url),{headers:{"Authorization":"Basic "+btoa(AC_ID+":"+AC_SEC),"Accept":"application/json"}});
  if(!r.ok) throw new Error("AC "+r.status);
  return r.json();
}

// ── DESIGN TOKENS ────────────────────────────────────────────────────────────
const T = {
  navy:    "#0B1F3A",
  navyMid: "#132847",
  navyCard:"#1A3257",
  teal:    "#1DB8A0",
  gold:    "#F0B429",
  red:     "#E84855",
  purple:  "#7B68EE",
  muted:   "#7A9BBF",
  border:  "rgba(255,255,255,0.07)",
  radius:  12,
};
const card = {background:T.navyCard,border:"1px solid "+T.border,borderRadius:T.radius,padding:"14px 16px"};
const cardTitle = {fontSize:11,color:T.muted,fontWeight:600,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"};

// ── SUB COMPONENTS ───────────────────────────────────────────────────────────
function SecDiv({color=T.teal,children}){
  return <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",
    margin:"14px 0 6px",paddingBottom:5,borderBottom:"1px solid "+T.border,
    display:"flex",alignItems:"center",gap:7}}>
    <div style={{width:3,height:13,borderRadius:2,background:color,flexShrink:0}}/>
    {children}
  </div>;
}

function Kpi({label,value,delta,color=T.teal,deltaColor}){
  return <div style={{...card,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,right:0,width:3,height:"100%",background:color}}/>
    <div style={{fontSize:11,color:T.muted,marginBottom:5}}>{label}</div>
    <div style={{fontSize:26,fontWeight:700,lineHeight:1}}>{value}</div>
    {delta&&<div style={{fontSize:11,marginTop:4,color:deltaColor||T.muted}}>{delta}</div>}
  </div>;
}

function Alert({type="gold",children}){
  const s = type==="red"
    ? {bg:"rgba(232,72,85,.1)",br:"rgba(232,72,85,.25)",c:"#F0827A"}
    : {bg:"rgba(240,180,41,.08)",br:"rgba(240,180,41,.25)",c:T.gold};
  return <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",
    borderRadius:8,fontSize:12,marginBottom:8,
    background:s.bg,border:"1px solid "+s.br,color:s.c}}>{children}</div>;
}

function Funnel({open,stageMap}){
  const sc={};
  open.forEach(d=>{const n=stageMap[d.stage_id]||"אחר";sc[n]=(sc[n]||0)+1});
  const arr=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const max=arr[0]?.[1]||1;
  if(!arr.length) return <div style={{color:T.muted,fontSize:12}}>אין עסקאות פתוחות</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {arr.map(([n,c],i)=><div key={n} style={{display:"flex",alignItems:"center",gap:7}}>
      <div style={{fontSize:11,color:T.muted,width:78,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div>
      <div style={{flex:1,height:20,background:"rgba(255,255,255,.05)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${Math.round(c/max*100)}%`,height:"100%",background:COLORS[i%8],
          display:"flex",alignItems:"center",padding:"0 7px",fontSize:11,fontWeight:600,color:"#fff",borderRadius:4}}>{c}</div>
      </div>
      <div style={{fontSize:10,color:T.muted,width:26,textAlign:"left"}}>{open.length?Math.round(c/open.length*100):0}%</div>
    </div>)}
  </div>;
}

function CallsDonut({calls,ib,ob,ms,dur,rate,ok}){
  if(!ok) return <div style={{color:T.muted,fontSize:12,lineHeight:1.7}}>
    ⚠️ Aircall לא מחובר<br/>
    <small style={{fontSize:10}}>פנה ל-Aircall Support להפעלת CORS</small>
  </div>;
  if(!calls.length) return <div style={{color:T.muted,fontSize:12}}>אין שיחות בטווח הזמן שנבחר</div>;
  const tot=calls.length;
  const r1=Math.round(ib.length/tot*188),r2=Math.round(ob.length/tot*188),r3=Math.round(ms.length/tot*188);
  return <>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle cx="42" cy="42" r="28" fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="12"/>
        <circle cx="42" cy="42" r="28" fill="none" stroke="#1DB8A0" strokeWidth="12" strokeDasharray={`${r1} 176`} strokeDashoffset="-14"/>
        <circle cx="42" cy="42" r="28" fill="none" stroke="#1A9AE0" strokeWidth="12" strokeDasharray={`${r2} 176`} strokeDashoffset={-(14+r1)}/>
        <circle cx="42" cy="42" r="28" fill="none" stroke="#E84855" strokeWidth="12" strokeDasharray={`${r3} 176`} strokeDashoffset={-(14+r1+r2)}/>
        <text x="42" y="46" textAnchor="middle" fontSize="12" fontWeight="700" fill="#F0F4F8">{tot}</text>
      </svg>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
        {[["#1DB8A0","נכנסות",ib.length],["#1A9AE0","יוצאות",ob.length],["#E84855","לא נענו",ms.length]].map(([col,lbl,val])=>
          <div key={lbl} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:12}}>
            <div style={{display:"flex",alignItems:"center",gap:5,color:T.muted}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:col}}/>{lbl}
            </div>
            <strong style={{color:lbl==="לא נענו"?"#F0827A":"#F0F4F8"}}>{val}</strong>
          </div>
        )}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:9}}>
      {[["משך ממוצע",mmss(dur),"#F0F4F8"],["שיעור מענה",rate+"%",rate>=80?T.teal:T.gold],["לא נענו",ms.length,T.red]].map(([l,v,c])=>
        <div key={l} style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"7px 8px"}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:2}}>{l}</div>
          <div style={{fontSize:15,fontWeight:700,color:c}}>{v}</div>
        </div>
      )}
    </div>
  </>;
}

function LeadsTable({open,stageMap,userMap}){
  const rows=open.map(d=>({...d,_d:daysIn(d)})).sort((a,b)=>b._d-a._d).slice(0,12);
  if(!rows.length) return <div style={{color:T.muted,fontSize:12,textAlign:"center",padding:"1.5rem"}}>אין עסקאות פתוחות</div>;
  return <div style={{overflowX:"auto"}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
      <colgroup><col width="20%"/><col width="13%"/><col width="14%"/><col width="9%"/><col width="6%"/><col width="10%"/><col width="14%"/></colgroup>
      <thead><tr>{["שם עסקה","ארגון","שלב","ערך","ימים","נציג","סטטוס"].map(h=>
        <th key={h} style={{color:T.muted,fontWeight:500,textAlign:"right",padding:"4px 6px 8px",
          borderBottom:"1px solid "+T.border,fontSize:10,textTransform:"uppercase",letterSpacing:".04em"}}>{h}</th>
      )}</tr></thead>
      <tbody>{rows.map(d=>{
        const di=d._d;
        const [bl,bbg,bc]=di>14?[`תקוע ${di}י'`,"rgba(232,72,85,.15)","#F0827A"]:
          di>7?[`ממתין ${di}י'`,"rgba(240,180,41,.15)",T.gold]:["פעיל","rgba(29,184,160,.15)",T.teal];
        const un=(userMap[d.user_id?.id||d.user_id]||"–").split(" ")[0];
        const sn=stageMap[d.stage_id]||"–";
        return <tr key={d.id} style={{borderBottom:"1px solid "+T.border}}>
          <td style={{padding:"8px 6px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(d.title||"").substring(0,20)}</td>
          <td style={{padding:"8px 6px",color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(d.org_name||"–").substring(0,13)}</td>
          <td style={{padding:"8px 6px"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:"rgba(29,184,160,.1)",color:T.teal}}>{sn.substring(0,12)}</span></td>
          <td style={{padding:"8px 6px",color:T.teal,fontWeight:600}}>{fmt(d.value)}</td>
          <td style={{padding:"8px 6px",color:di>7?T.gold:T.muted}}>{di}</td>
          <td style={{padding:"8px 6px",color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{un}</td>
          <td style={{padding:"8px 6px"}}><span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,background:bbg,color:bc}}>{bl}</span></td>
        </tr>;
      })}</tbody>
    </table>
  </div>;
}

function TeamBars({open,userMap}){
  const b={};
  open.forEach(d=>{const uid=d.user_id?.id||d.user_id;if(!b[uid])b[uid]={name:userMap[uid]||"–",c:0,v:0};b[uid].c++;b[uid].v+=Number(d.value)||0});
  const arr=Object.values(b).sort((a,x)=>x.c-a.c);
  const max=arr[0]?.c||1;
  if(!arr.length) return <div style={{color:T.muted,fontSize:12}}>אין נציגים</div>;
  return <div>{arr.map((u,i)=>{
    const init=u.name.split(" ").map(w=>w[0]||"").join("").substring(0,2).toUpperCase();
    return <div key={u.name} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
      <div style={{width:26,height:26,borderRadius:"50%",background:COLORS[i%8]+"22",color:COLORS[i%8],
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{init}</div>
      <div style={{fontSize:11,width:52,flexShrink:0,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name.split(" ")[0]}</div>
      <div style={{flex:1,height:7,background:"rgba(255,255,255,.06)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${Math.round(u.c/max*100)}%`,height:7,background:COLORS[i%8],borderRadius:4}}/>
      </div>
      <div style={{fontSize:11,fontWeight:600,width:62,textAlign:"left",color:COLORS[i%8]}}>{u.c}·{fmt(u.v)}</div>
    </div>;
  })}</div>;
}

// ── PRODUCTS / INVENTORY TAB ─────────────────────────────────────────────────
function ProductsTab({products,codeMap}){
  const [search,setSearch] = useState("");
  const [filterType,setFilterType] = useState("all");

  if(!products.length) return <div style={{color:T.muted,fontSize:13,textAlign:"center",padding:"2rem"}}>לא נטענו מוצרים</div>;

  // Parse product name: e.g. "TCFJ-6627-פנימי" → {code:"TCFJ", trip:"6627", room:"פנימי"}
  const parsed = products.map(p=>{
    const parts = (p.name||"").split("-");
    const code = parts[0]||"";
    const tripNum = parts[1]||"";
    const roomType = parts.slice(2).join("-")||"";
    const tripName = codeMap[code]||code;
    const totalQty = Number(p.quantity)||0;
    const stock = p.unit_price ? Number(p.unit_price) : 0;
    // custom fields
    const freeRooms = Number(p.prices?.[0]?.price)||0;
    return {...p, code, tripNum, roomType, tripName, totalQty, freeRooms };
  });

  const types = [...new Set(parsed.map(p=>p.code))].sort();

  const filtered = parsed.filter(p=>{
    const q = search.toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.tripName.toLowerCase().includes(q) || p.roomType.toLowerCase().includes(q);
    const matchType = filterType==="all" || p.code===filterType;
    return matchSearch && matchType;
  });

  // Summary stats
  const totalProducts = parsed.length;
  const totalFree = parsed.reduce((s,p)=>s+(p.quantity_available||p.freeRooms||0),0);
  const totalSold = parsed.reduce((s,p)=>s+(p.quantity_used||0),0);
  const trips = [...new Set(parsed.map(p=>p.tripNum))].length;

  const roomColors={"פנימי":"#1A9AE0","חלון":"#1DB8A0","מרפסת":"#F0B429","דק עליון":"#7B68EE","דק אמצעי":"#F06292"};
  const getRoomColor = rt => {
    for(const [k,v] of Object.entries(roomColors)) if(rt.includes(k)) return v;
    return "#888";
  };

  return <div className="fade">
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
      <Kpi label="🛳️ סה״כ מוצרים" value={totalProducts} delta="חדרים במלאי"/>
      <Kpi label="🗺️ טיולים" value={trips} delta="יעדים שונים"/>
      <Kpi label="✅ פנויים" value={totalFree} delta="זמינים למכירה" color={T.teal} deltaColor={T.teal}/>
      <Kpi label="🔒 תפוסים" value={totalSold} delta="כבר נמכרו" color={T.gold} deltaColor={T.gold}/>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="🔍 חפש קוד, שם טיול, סוג חדר..."
        style={{background:T.navyCard,border:"1px solid "+T.border,color:"#F0F4F8",fontSize:12,
          padding:"7px 12px",borderRadius:8,flex:1,minWidth:200,direction:"rtl"}}/>
      <select value={filterType} onChange={e=>setFilterType(e.target.value)}
        style={{background:T.navyCard,border:"1px solid "+T.border,color:"#F0F4F8",fontSize:12,
          padding:"7px 10px",borderRadius:8,cursor:"pointer"}}>
        <option value="all">כל הקודים</option>
        {types.map(t=><option key={t} value={t}>{t} {codeMap[t]?"– "+codeMap[t]:""}</option>)}
      </select>
    </div>

    <div style={{fontSize:11,color:T.muted,marginBottom:8}}>{filtered.length} מוצרים מוצגים</div>

    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr>{["שם מוצר","טיול","סוג חדר","תאריך יציאה","פנויים","תפוסים","במלאי"].map(h=>
          <th key={h} style={{color:T.muted,fontWeight:500,textAlign:"right",padding:"6px 8px",
            borderBottom:"1px solid "+T.border,fontSize:10,textTransform:"uppercase",letterSpacing:".04em",
            whiteSpace:"nowrap"}}>{h}</th>
        )}</tr></thead>
        <tbody>{filtered.map(p=>{
          const free = p.quantity_available ?? p.freeRooms ?? 0;
          const used = p.quantity_used ?? 0;
          const total = p.quantity ?? p.totalQty ?? 0;
          const roomCol = getRoomColor(p.roomType);
          return <tr key={p.id} style={{borderBottom:"1px solid "+T.border}}>
            <td style={{padding:"8px",fontWeight:500,fontSize:12}}>{p.name||"–"}</td>
            <td style={{padding:"8px"}}>
              <div style={{fontSize:12,fontWeight:600,color:T.teal}}>{p.code}</div>
              {codeMap[p.code]&&<div style={{fontSize:10,color:T.muted,marginTop:1}}>{codeMap[p.code]}</div>}
            </td>
            <td style={{padding:"8px"}}>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:roomCol+"22",color:roomCol,fontWeight:600}}>{p.roomType||"–"}</span>
            </td>
            <td style={{padding:"8px",color:T.muted,fontSize:11,whiteSpace:"nowrap"}}>{p.tripNum?"יציאה "+p.tripNum:"–"}</td>
            <td style={{padding:"8px"}}>
              <span style={{fontSize:13,fontWeight:700,color:free>0?T.teal:T.red}}>{free}</span>
            </td>
            <td style={{padding:"8px",color:T.muted}}>{used}</td>
            <td style={{padding:"8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:6,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden",minWidth:40}}>
                  <div style={{width:total>0?`${Math.round(used/total*100)}%`:"0%",height:6,background:used/total>0.8?T.red:T.teal,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,color:T.muted,minWidth:24}}>{total}</span>
              </div>
            </td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  </div>;
}

// ── ADS DEMO TAB ─────────────────────────────────────────────────────────────
function AdsTab(){
  const google = [
    {name:"Search – קרוז ים תיכון",budget:8200,leads:68,cpl:121,conv:12},
    {name:"Search – קרוז יוון",budget:4100,leads:34,cpl:121,conv:7},
    {name:"Display",budget:2100,leads:14,cpl:150,conv:2},
    {name:"YouTube",budget:1500,leads:9,cpl:167,conv:1},
  ];
  const fb = [
    {name:"Lead Gen – קרוזים",budget:3800,leads:38,cpl:100,conv:9},
    {name:"Instagram Stories",budget:1600,leads:13,cpl:123,conv:3},
    {name:"Retargeting",budget:1200,leads:5,cpl:240,conv:1},
    {name:"Lookalike",budget:900,leads:7,cpl:129,conv:2},
  ];
  const totalBudget = [...google,...fb].reduce((s,c)=>s+c.budget,0);
  const totalLeads = [...google,...fb].reduce((s,c)=>s+c.leads,0);
  const totalConv = [...google,...fb].reduce((s,c)=>s+c.conv,0);
  const avgCpl = Math.round(totalBudget/totalLeads);

  return <div className="fade">
    <div style={{background:"rgba(240,180,41,.08)",border:"1px solid rgba(240,180,41,.2)",borderRadius:8,
      padding:"8px 14px",fontSize:12,color:T.gold,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
      📊 נתוני פרסום אלו הם דמו – לחיבור נתונים אמיתיים נדרש Google Ads API ו-Facebook Marketing API
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
      <Kpi label="💸 הוצאות פרסום" value={"₪"+totalBudget.toLocaleString()} delta="גוגל + פייסבוק"/>
      <Kpi label="👥 לידים מפרסום" value={totalLeads} delta="30 ימים" color={T.teal} deltaColor={T.teal}/>
      <Kpi label="✅ המרות" value={totalConv} delta="עסקאות שנסגרו" color={T.gold} deltaColor={T.gold}/>
      <Kpi label="💰 עלות לליד" value={"₪"+avgCpl} delta="ממוצע כולל"/>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[["🔵 Google Ads",google,T.teal],["🔷 Facebook & Instagram",fb,"#1A9AE0"]].map(([title,rows,col])=>
        <div key={title} style={card}>
          <div style={cardTitle}>{title}</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["קמפיין","תקציב","לידים","CPL","המרות"].map(h=>
              <th key={h} style={{color:T.muted,fontWeight:500,textAlign:"right",padding:"4px 6px 7px",
                borderBottom:"1px solid "+T.border,fontSize:10}}>{h}</th>
            )}</tr></thead>
            <tbody>{rows.map(r=><tr key={r.name} style={{borderBottom:"1px solid "+T.border}}>
              <td style={{padding:"7px 6px",fontSize:11}}>{r.name}</td>
              <td style={{padding:"7px 6px",color:T.muted}}>₪{r.budget.toLocaleString()}</td>
              <td style={{padding:"7px 6px",fontWeight:600,color:col}}>{r.leads}</td>
              <td style={{padding:"7px 6px",color:r.cpl>150?T.red:r.cpl>120?T.gold:T.teal,fontWeight:600}}>₪{r.cpl}</td>
              <td style={{padding:"7px 6px",color:T.muted}}>{r.conv}</td>
            </tr>)}
            </tbody>
          </table>
        </div>
      )}
    </div>
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
export default function App(){
  const [tab,setTab] = useState("main");
  const [days,setDays] = useState(30);
  const [loading,setLoading] = useState(true);
  const [ts,setTs] = useState(null);
  const [d,setD] = useState(null);
  const [errs,setErrs] = useState([]);
  const [codeMap,setCodeMap] = useState({});

  // Load code map from localStorage (set via קודי_טיולים.html)
  useEffect(()=>{
    try{
      const saved = localStorage.getItem("cruise_codes");
      if(saved){
        const arr = JSON.parse(saved);
        const map = {};
        arr.forEach(c=>{ map[c.code]=c.name; });
        setCodeMap(map);
      }
    }catch(e){}
  },[]);

  const load = useCallback(async()=>{
    setLoading(true); setErrs([]);
    const since = ago(days);
    const sinceTs = Math.floor(new Date(since).getTime()/1000);
    const e=[];

    const [deals,persons,acts,users,stages,products,callsRaw] = await Promise.all([
      pdGet("/deals?status=all").catch(ex=>{e.push("Pipedrive עסקאות: "+ex.message);return[]}),
      pdGet("/persons").catch(()=>[]),
      pdGet("/activities?done=0").catch(()=>[]),
      pdGet("/users").catch(()=>[]),
      pdGet("/stages").catch(()=>[]),
      pdGet("/products").catch(()=>[]),
      acGet("/calls?order=DESC&per_page=100&from="+sinceTs).catch(ex=>{e.push("Aircall: "+ex.message);return null})
    ]);

    const open  = deals.filter(x=>x.status==="open");
    const won   = deals.filter(x=>x.status==="won");
    const newP  = persons.filter(p=>p.add_time&&p.add_time.substring(0,10)>=since);
    const recW  = won.filter(x=>x.won_time&&x.won_time.substring(0,10)>=since);
    const pVal  = open.reduce((s,x)=>s+(Number(x.value)||0),0);

    const stageMap={};stages.forEach(s=>stageMap[s.id]=s.name);
    const userMap={};users.forEach(u=>userMap[u.id]=u.name);

    let calls=[];
    const acOK = callsRaw!==null;
    if(acOK){
      if(Array.isArray(callsRaw)) calls=callsRaw;
      else if(callsRaw.calls) calls=callsRaw.calls;
      else if(callsRaw.data) calls=callsRaw.data;
    }
    const ib  = calls.filter(c=>c.direction==="inbound");
    const ob  = calls.filter(c=>c.direction==="outbound");
    const ms  = calls.filter(c=>c.missed===true||c.status==="missed"||(c.direction==="inbound"&&c.answered===false)||(c.direction==="inbound"&&!c.duration));
    const ans = calls.filter(c=>c.answered===true||(c.duration>0&&c.status!=="missed"));
    const dur = ans.length ? Math.round(ans.reduce((s,c)=>s+(c.duration||0),0)/ans.length) : 0;
    const rate= calls.length ? Math.round((calls.length-ms.length)/calls.length*100) : 0;

    setD({open,won,newP,recW,pVal,stageMap,userMap,acts,calls,acOK,ib,ob,ms,dur,rate,products});
    setErrs(e);
    setTs(new Date().toLocaleTimeString("he-IL"));
    setLoading(false);
  },[days]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{const id=setInterval(load,5*60*1000);return()=>clearInterval(id);},[load]);

  const tabs = [
    {id:"main",label:"📊 סקירה"},
    {id:"leads",label:"🔥 לידים"},
    {id:"inventory",label:"🛳️ מלאי"},
    {id:"ads",label:"📢 פרסום"},
  ];

  return <div style={{background:T.navy,minHeight:"100vh",direction:"rtl"}}>
    {/* TOPBAR */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"10px 18px",borderBottom:"1px solid "+T.border,background:T.navyMid,
      position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:17,fontWeight:700,color:T.teal}}>⚓ דשבורד מכירות</span>
        <span style={{fontSize:12,color:T.muted}}>קרוזים מאורגנים</span>
        <span style={{width:7,height:7,borderRadius:"50%",background:loading?T.gold:T.teal,
          display:"inline-block",animation:loading?"none":"blink 2s infinite"}}/>
        <span style={{fontSize:11,color:T.muted}}>{loading?"טוען...":ts?"מחובר · "+ts:""}</span>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <select value={days} onChange={e=>setDays(Number(e.target.value))}
          style={{background:T.navyCard,border:"1px solid "+T.border,color:"#F0F4F8",fontSize:12,padding:"5px 10px",borderRadius:6,cursor:"pointer"}}>
          <option value={7}>7 ימים</option><option value={30}>30 ימים</option><option value={90}>רבעון</option>
        </select>
        <button onClick={load} disabled={loading}
          style={{background:"transparent",border:"1px solid "+T.border,color:T.muted,fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>
          {loading?"...":"↻ רענן"}
        </button>
        <a href="codes.html" target="_blank"
          style={{background:"rgba(29,184,160,.1)",border:"1px solid rgba(29,184,160,.2)",color:T.teal,fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer",textDecoration:"none"}}>
          ⚙️ קודי טיולים
        </a>
      </div>
    </div>

    {/* TABS */}
    <div style={{display:"flex",gap:2,padding:"8px 18px 0",borderBottom:"1px solid "+T.border,background:T.navyMid}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
        style={{background:tab===t.id?T.navyCard:"transparent",
          border:tab===t.id?"1px solid "+T.border:"1px solid transparent",
          borderBottom:tab===t.id?"1px solid "+T.navyCard:"none",
          color:tab===t.id?"#F0F4F8":T.muted,fontSize:12,padding:"7px 14px",
          borderRadius:"8px 8px 0 0",cursor:"pointer",fontWeight:tab===t.id?500:400,
          marginBottom:tab===t.id?"-1px":0}}>
        {t.label}
      </button>)}
    </div>

    <div style={{padding:"12px 18px"}}>
      {loading&&!d&&<div style={{textAlign:"center",padding:"3rem",color:T.muted}}>
        <div className="spinner"/><div>מתחבר ל-Pipedrive ו-Aircall...</div>
      </div>}

      {errs.map((e,i)=><Alert key={i} type="gold">⚠️ {e}</Alert>)}

      {d&&(()=>{
        const {open,won,newP,recW,pVal,stageMap,userMap,acts,calls,acOK,ib,ob,ms,dur,rate,products}=d;
        const stuck=open.filter(x=>daysIn(x)>14).length;

        if(tab==="inventory") return <ProductsTab products={products} codeMap={codeMap}/>;
        if(tab==="ads") return <AdsTab/>;

        return <>
          {stuck>0&&<Alert type="red">⚠️ {stuck} עסקאות תקועות מעל 14 ימים</Alert>}
          {ms.length>8&&<Alert type="gold">📵 {ms.length} שיחות לא נענו ב-{days} הימים האחרונים</Alert>}

          {tab==="main"&&<div className="fade">
            <SecDiv>Pipedrive</SecDiv>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
              <Kpi label="👥 לידים חדשים" value={newP.length} delta={days+" ימים אחרונים"}/>
              <Kpi label="📋 עסקאות פתוחות" value={open.length} delta="כרגע ב-pipeline"/>
              <Kpi label="✅ נסגרו" value={recW.length} delta={days+" ימים"} deltaColor={T.teal}/>
              <Kpi label="💰 ערך pipeline" value={fmt(pVal)} delta="סה״כ פתוח" color={T.gold} deltaColor={T.gold}/>
            </div>

            <SecDiv color={T.gold}>Aircall – שיחות</SecDiv>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
              <Kpi label="📞 סה״כ שיחות" value={acOK?calls.length:"–"} delta={days+" ימים"}/>
              <Kpi label="📲 נכנסות" value={acOK?ib.length:"–"} delta={calls.length?Math.round(ib.length/calls.length*100)+"%":"–"} deltaColor={T.teal}/>
              <Kpi label="📤 יוצאות" value={acOK?ob.length:"–"} delta={calls.length?Math.round(ob.length/calls.length*100)+"%":"–"} color={T.gold}/>
              <Kpi label="🔕 לא נענו" value={acOK?ms.length:"–"} delta={"מענה "+rate+"%"} color={T.red} deltaColor={T.red}/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div style={card}><div style={cardTitle}>משפך מכירות</div><Funnel open={open} stageMap={stageMap}/></div>
              <div style={card}><div style={cardTitle}>שיחות Aircall</div><CallsDonut calls={calls} ib={ib} ob={ob} ms={ms} dur={dur} rate={rate} ok={acOK}/></div>
              <div style={card}>
                <div style={cardTitle}>ערך לפי שלב</div>
                {(()=>{const sv={};open.forEach(x=>{const n=stageMap[x.stage_id]||"אחר";sv[n]=(sv[n]||0)+(Number(x.value)||0)});
                const arr=Object.entries(sv).sort((a,b)=>b[1]-a[1]).slice(0,5);
                return arr.length?arr.map(([n,v])=><div key={n} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                  <span style={{fontSize:11,color:T.muted}}>{n.substring(0,18)}</span>
                  <span style={{fontSize:12,fontWeight:600,color:T.teal}}>{fmt(v)}</span>
                </div>):<div style={{color:T.muted,fontSize:12}}>אין נתונים</div>;})()}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div style={card}><div style={cardTitle}>נציגים – pipeline</div><TeamBars open={open} userMap={userMap}/></div>
              <div style={card}>
                <div style={cardTitle}>פעילויות קרובות</div>
                {(acts||[]).slice(0,6).map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                  <div><div style={{fontSize:12}}>{(a.subject||"פעילות").substring(0,24)}</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:1}}>{a.type||""} · {a.due_date||""}</div></div>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:20,
                    background:"rgba(240,180,41,.15)",color:T.gold}}>{a.due_date||"–"}</span>
                </div>)}
                {!acts?.length&&<div style={{color:T.muted,fontSize:12}}>אין פעילויות</div>}
              </div>
              <div style={card}>
                <div style={cardTitle}>נסגרו לאחרונה</div>
                {won.sort((a,b)=>new Date(b.won_time||0)-new Date(a.won_time||0)).slice(0,5).map(x=><div key={x.id}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border}}>
                  <span style={{fontSize:11,color:T.muted}}>{(x.title||"").substring(0,20)}</span>
                  <span style={{fontSize:12,fontWeight:600,color:T.teal}}>{fmt(x.value)}</span>
                </div>)}
                {!won.length&&<div style={{color:T.muted,fontSize:12}}>אין עסקאות שנסגרו</div>}
              </div>
            </div>
          </div>}

          {tab==="leads"&&<div className="fade">
            <SecDiv color={T.gold}>לידים חמים – כל העסקאות הפתוחות</SecDiv>
            <div style={card}><LeadsTable open={open} stageMap={stageMap} userMap={userMap}/></div>
          </div>}
        </>;
      })()}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
